<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Calculadora Financeira</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Calculadora Financeira</h1>

    <div class="inputs">
      <input type="number" id="valor1" placeholder="Digite o primeiro valor" step="0.01">
      <input type="number" id="valor2" placeholder="Digite o segundo valor" step="0.01">
    </div>

    <div class="buttons">
      <button onclick="calcular('+')">+</button>
      <button onclick="calcular('-')">−</button>
      <button onclick="calcular('*')">×</button>
      <button onclick="calcular('/')">÷</button>
    </div>

    <div class="resultado">
      <h2>Resultado:</h2>
      <p id="saida">R$ 0,00</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
